<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Amora web</title>
  <link rel="icon" href="assets/img/imagenes_extra/icono.png" type="imagen/png" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Didact+Gothic&display=swap');

    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      font-family: "Didact Gothic", sans-serif;
    }

    /* NAV PRINCIPAL */
    nav {
      display: flex;
      justify-content: space-around;
      height: 10vh;
    }

    /* LINKS */
    .nav-links{
      display: flex;
      align-items: center;
      transition: ease 0.5s;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 1.2rem;
      color: #313131;
      padding: 30px 25px;
      transition: color 0.3s ease, border-bottom 0.3s ease;
    }

    .nav-links a:hover {
      color: #ffffff;
      background-color: #a67c52;
    }

    /* BOTÓN DE MÚSICA */
    .music-btn {
      border: none;
      background: #a67c52;
      color: white;
      font-size: 1.4rem;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      margin: auto 0px;
    }

    .music-btn:hover {
      background: #53391d;
      transform: scale(1.2);
    }

    /* HAMBURGUESA */
    .menu-toggle {
      display: none;
      font-size: 1.8rem;
      cursor: pointer;
      background: none;
      border: none;
      color: #333;
    }

    /* IFRAME */
    iframe[name="contenido"] {
      width: 100%;
      height: calc(100vh - 70px);
      border: none;
      display: block;
      z-index: 1;
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 1115px) {
      .nav-links {
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        background: rgba(255,255,255,0.98);
        flex-direction: column;
        gap: 15px;
        align-items: center;
        max-height: 0;
        overflow: hidden;
      }

      .nav-links.active {
        max-height: 500px;
        padding: 10px 0;
      }

      .menu-toggle {
        display: block;
      }
    }
  </style>
</head>

<body>

  <nav>

    <button class="menu-toggle" id="menuToggle">☰</button>

    <div class="nav-links" id="navLinks">
      <a href="pagina1.html" target="contenido">Inicio</a>
      <a href="pagina2.html" target="contenido">Historia</a>
      <a href="pagina3.html" target="contenido">Detalles</a>
      <a href="pagina4.html" target="contenido">Programa</a>
      <a href="asistencia.html" target="contenido">Confirmación y mesa</a>
      <a href="regalos.html" target="contenido">Regalos</a>
      <a href="pagina6.html" target="contenido">Vestimenta</a>
      <a href="pagina7.html" target="contenido">Agradecimiento</a>
    </div>

    <button id="playPause" class="music-btn">⏸</button>

  </nav>

  <iframe id="contenido" name="contenido" src="pagina1.html"></iframe>

  <audio id="musica" autoplay loop>
    <source src="assets/audio/Manuel Medrano - Bajo El Agua (Video Oficial) - Manuel Medrano.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const musica = document.getElementById("musica");
    const playPauseBtn = document.getElementById("playPause");
    const menuToggle = document.getElementById("menuToggle");
    const navLinks = document.getElementById("navLinks");

    // Música
    playPauseBtn.addEventListener("click", () => {
      if (musica.paused) {
        musica.play();
        playPauseBtn.textContent = "⏸";
      } else {
        musica.pause();
        playPauseBtn.textContent = "▶";
      }
    });

    // Menú responsive
    menuToggle.addEventListener("click", () => {
      navLinks.classList.toggle("active");
    });

    // Cerrar menú al hacer clic en un enlace
    document.querySelectorAll(".nav-links a").forEach(link => {
      link.addEventListener("click", () => {
        navLinks.classList.remove("active");
      });
    });
  </script>
</body>
</html>
